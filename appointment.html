<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Appointment</title>

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="style-appointment.css"
    >

    <!-- FONT AWESOME -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

</head>

<body>

    <div class="dashboard-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <!-- LOGO -->
            <div class="sidebar-logo">

                <img
                    src="logo-klinik.png"
                    alt="Logo Klinik"
                    class="logo"
                >

                <div class="logo-text">

                    <h2>Vet Clinic</h2>

                    <p>Klinik Hewan</p>

                </div>

            </div>

            <!-- MENU -->
            <div class="menu-container">

                <a href="dashboard-user.html" class="menu-card">
                    <i class="fa-solid fa-house"></i>
                    <span>Dashboard</span>
                </a>

                <a href="pet-list.html" class="menu-card">
                    <i class="fa-solid fa-paw"></i>
                    <span>Hewan Saya</span>
                </a>

                <a href="appointment.html" class="menu-card active">
                    <i class="fa-solid fa-calendar-days"></i>
                    <span>Appointment</span>
                </a>

                <a href="visit-history.html" class="menu-card">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    <span>Riwayat Kunjungan</span>
                </a>

                <a href="jadwal-vaksin.html" class="menu-card">
                    <i class="fa-solid fa-syringe"></i>
                    <span>Jadwal Vaksin</span>
                </a>

                <a href="payment.html" class="menu-card">
                    <i class="fa-solid fa-credit-card"></i>
                    <span>Pembayaran</span>
                </a>

                <a href="notifications.html" class="menu-card">
                    <i class="fa-solid fa-bell"></i>
                    <span>Notifikasi</span>
                </a>

                <a href="profile.html" class="menu-card">
                    <i class="fa-solid fa-user"></i>
                    <span>Profil Saya</span>
                </a>

            </div>

        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">

            <!-- HEADER -->
            <div class="page-header">

                <h1>Appointment</h1>

                <p>
                    Kelola jadwal kunjungan
                    klinik hewan Anda
                </p>

            </div>

            <!-- NAVIGATION CARD -->
            <div class="appointment-navigation">

                <button
                    class="nav-btn active"
                    id="myAppointmentBtn"
                >
                    Appointment Saya
                </button>

                <button
                    class="nav-btn"
                    id="createAppointmentBtn"
                >
                    Buat Appointment
                </button>

            </div>

            <!-- CREATE APPOINTMENT -->
            <section class="appointment-form-card">

                <h2>Buat Appointment</h2>

                <form id="appointmentForm">

                    <!-- PET -->
                    <div class="form-group">

                        <label>Pilih Hewan</label>

                        <select required>

                            <option value="">
                                -- Pilih Hewan --
                            </option>

                            <option>
                                Kucing Oyen
                            </option>

                            <option>
                                Anjing Bruno
                            </option>

                        </select>

                    </div>

                    <!-- SERVICE -->
                    <div class="form-group">

                        <label>Pilih Layanan</label>

                        <select required>

                            <option value="">
                                -- Pilih Layanan --
                            </option>

                            <option>Vaksin</option>
                            <option>Grooming</option>
                            <option>Pemeriksaan</option>

                        </select>

                    </div>

                    <!-- DOCTOR -->
                    <div class="form-group">

                        <label>Pilih Dokter</label>

                        <select required>

                            <option value="">
                                -- Pilih Dokter --
                            </option>

                            <option>Dr. Andi</option>
                            <option>Dr. Sarah</option>

                        </select>

                    </div>

                    <!-- DATE -->
                    <div class="form-group">

                        <label>Pilih Tanggal</label>

                        <input
                            type="date"
                            required
                        >

                    </div>

                    <!-- TIME -->
                    <div class="form-group">

                        <label>Pilih Waktu</label>

                        <input
                            type="time"
                            required
                        >

                    </div>

                    <!-- NOTES -->
                    <div class="form-group">

                        <label>
                            Catatan Tambahan
                            (Opsional)
                        </label>

                        <textarea
                            rows="4"
                            placeholder="Tambahkan catatan..."
                        ></textarea>

                    </div>

                    <!-- BUTTON -->
                    <button
                        type="submit"
                        class="submit-btn"
                    >
                        Buat Appointment
                    </button>

                </form>

            </section>

            <!-- MY APPOINTMENT -->
            <section class="my-appointment-card">

                <div class="appointment-item">

                    <!-- LEFT -->
                    <div class="appointment-info">

                        <h3>Kucing Oyen</h3>

                        <p>
                            Vaksin •
                            Dr. Sarah •
                            15 Mei 2026 •
                            10:00 WIB
                        </p>

                    </div>

                    <!-- RIGHT -->
                    <div class="appointment-action">

                        <button class="reschedule-btn">
                            Reschedule
                        </button>

                        <button class="cancel-btn">
                            Batalkan
                        </button>

                    </div>

                </div>

            </section>

        </main>

    </div>

    <script src="appointment.js"></script>

</body>
</html>
